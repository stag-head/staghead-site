<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>404 — Page not found · Stag Head</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#0A0A0A">
<link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="/styles/tokens.css">
<link rel="stylesheet" href="/styles/variations.css">
<style>
  .e404-wrap {
    min-height: 100dvh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: clamp(40px, 8vw, 100px) var(--gutter);
    text-align: center;
  }
  .e404-code {
    font-family: var(--font-mono);
    font-size: clamp(80px, 18vw, 160px);
    font-weight: 400;
    line-height: 1;
    letter-spacing: -0.04em;
    color: var(--line-strong);
    margin: 0 0 32px;
    user-select: none;
  }
  .e404-eyebrow {
    font-family: var(--font-mono);
    font-size: 11px; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--ink-3);
    margin: 0 0 16px;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .e404-eyebrow .bar { width: 20px; height: 1px; background: var(--ink-3); }
  .e404-heading {
    font-family: var(--font-display);
    font-size: clamp(22px, 4vw, 36px);
    font-weight: 500; letter-spacing: -0.025em;
    color: var(--ink); margin: 0 0 16px;
  }
  .e404-sub {
    font-size: 16px; color: var(--ink-2); line-height: 1.6;
    max-width: 42ch; margin: 0 auto 40px;
  }
  .e404-actions {
    display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
  }
  .e404-btn {
    display: inline-block;
    padding: 12px 24px; border-radius: var(--radius);
    font-family: var(--font-display); font-size: 14px; font-weight: 600;
    letter-spacing: -0.01em; text-decoration: none;
    transition: opacity .15s ease;
  }
  .e404-btn:hover { opacity: 0.8; }
  .e404-btn--primary {
    background: var(--ink); color: var(--bg);
  }
  .e404-btn--ghost {
    border: 1px solid var(--line-strong); color: var(--ink-2);
  }
  .e404-foot {
    position: fixed; bottom: 24px;
    font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--ink-3);
  }
</style>
<script>try{var s=JSON.parse(localStorage.getItem('sh.tweaks')||'{}');if(s.theme)document.documentElement.setAttribute('data-theme',s.theme)}catch(e){}</script>
</head>
<body>

<div class="e404-wrap">
  <p class="e404-code" aria-hidden="true">404</p>
  <p class="e404-eyebrow"><span class="bar"></span> Page not found <span class="bar"></span></p>
  <h1 class="e404-heading">Nothing here</h1>
  <p class="e404-sub">The page you are looking for has moved, been deleted, or never existed. Try the links below.</p>
  <div class="e404-actions">
    <a href="/" class="e404-btn e404-btn--primary">← Back to staghead.nz</a>
    <a href="/budget-pro/help" class="e404-btn e404-btn--ghost">Budget Pro docs</a>
  </div>
</div>

<p class="e404-foot">Stag Head Limited</p>

</body>
</html>
